<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PACT — Sync test</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin:0;
           background:#0f172a; color:#e2e8f0; }
    .wrap { max-width: 640px; margin:0 auto; padding:2rem 1.25rem; }
    h1 { font-size:1.3rem; margin:0 0 .25rem; }
    p.sub { color:#94a3b8; margin:0 0 1.25rem; font-size:.9rem; }
    fieldset { border:1px solid #334155; border-radius:.6rem; margin:0 0 1.25rem; padding:1rem; }
    legend { color:#38bdf8; font-size:.85rem; padding:0 .4rem; }
    label { display:block; font-size:.8rem; color:#94a3b8; margin:.5rem 0 .2rem; }
    input, textarea { width:100%; box-sizing:border-box; background:#1e293b; color:#e2e8f0;
            border:1px solid #334155; border-radius:.4rem; padding:.5rem; font-size:.9rem; font-family:inherit; }
    textarea { min-height:3rem; resize:vertical; }
    button { background:#38bdf8; color:#0f172a; border:none; border-radius:.4rem;
             padding:.5rem .9rem; font-weight:600; cursor:pointer; margin-top:.6rem; }
    button.ghost { background:#1e293b; color:#e2e8f0; border:1px solid #334155; }
    .row { display:flex; gap:.5rem; flex-wrap:wrap; }
    table { width:100%; border-collapse:collapse; font-size:.85rem; margin-top:.5rem; }
    th, td { text-align:left; padding:.4rem .5rem; border-bottom:1px solid #334155; }
    th { color:#94a3b8; font-weight:500; }
    .log { font-family:ui-monospace, monospace; font-size:.8rem; white-space:pre-wrap;
           background:#020617; border:1px solid #334155; border-radius:.4rem; padding:.6rem; min-height:4rem; }
    .pill { font-size:.75rem; padding:.1rem .5rem; border-radius:1rem; }
    .on  { background:#064e3b; color:#4ade80; }
    .off { background:#450a0a; color:#f87171; }
    code { color:#7dd3fc; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Sync test harness</h1>
    <p class="sub">
      Status: <span id="netPill" class="pill"></span> &nbsp;|&nbsp; <span id="who">checking…</span><br>
      Not signed in? <a href="login.html" style="color:#38bdf8">Sign in first</a>, then return here.
    </p>

    <fieldset>
      <legend>Save a character</legend>
      <label for="cid">Character id (blank = new)</label>
      <input id="cid" placeholder="leave blank to create">
      <label for="cname">Name</label>
      <input id="cname" value="Test Hero">
      <label for="cstats">stats (raw JSON — build or event log)</label>
      <textarea id="cstats">{"note":"hello"}</textarea>
      <div class="row">
        <button id="saveBtn">Save</button>
        <button id="loadBtn" class="ghost">Load this id</button>
      </div>
    </fieldset>

    <fieldset>
      <legend>Characters</legend>
      <div class="row">
        <button id="listBtn" class="ghost">Refresh list</button>
        <button id="syncBtn" class="ghost">Sync now</button>
      </div>
      <table>
        <thead><tr><th>name</th><th>kind</th><th>ap</th><th>updated</th><th>id</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </fieldset>

    <fieldset>
      <legend>Log</legend>
      <div id="log" class="log"></div>
    </fieldset>
  </div>

  <script type="module">
    import { currentUser } from './js/auth.js';
    import {
      saveCharacter, loadCharacter, listCharacters, syncAll, initSync
    } from './js/sync.js';

    const $ = id => document.getElementById(id);
    const log = (m) => { $('log').textContent = '› ' + m + '\n' + $('log').textContent; };

    function paintNet() {
      const p = $('netPill');
      p.textContent = navigator.onLine ? 'ONLINE' : 'OFFLINE';
      p.className = 'pill ' + (navigator.onLine ? 'on' : 'off');
    }
    window.addEventListener('online', paintNet);
    window.addEventListener('offline', paintNet);
    paintNet();

    (async () => {
      const u = await currentUser();
      $('who').textContent = u ? ('signed in: ' + u.email) : 'NOT signed in';
    })();

    $('saveBtn').onclick = async () => {
      let stats;
      try { stats = JSON.parse($('cstats').value); }
      catch { log('stats is not valid JSON'); return; }
      const r = await saveCharacter({
        id: $('cid').value.trim() || undefined,
        name: $('cname').value.trim(),
        kind: 'livesheet',
        stats,
      });
      $('cid').value = r.id;
      log(`save ${r.id} → ${r.synced ? 'synced to cloud' : 'saved LOCAL only' + (r.error ? ' ('+r.error.message+')' : '')}`);
      refresh();
    };

    $('loadBtn').onclick = async () => {
      const id = $('cid').value.trim();
      if (!id) { log('enter an id to load'); return; }
      const rec = await loadCharacter(id);
      if (!rec) { log('no such character'); return; }
      $('cname').value = rec.name; $('cstats').value = JSON.stringify(rec.stats);
      log(`loaded ${id} (ap=${rec.ap}, ${rec.dirty ? 'dirty' : 'clean'})`);
    };

    $('listBtn').onclick = refresh;
    $('syncBtn').onclick = async () => { const r = await syncAll(); log('syncAll → reconciled ' + r.synced); refresh(); };

    async function refresh() {
      try {
        const list = await listCharacters();
        $('rows').innerHTML = list.map(c =>
          `<tr><td>${c.name ?? ''}</td><td>${c.kind ?? ''}</td><td>${c.ap ?? 0}</td>`
          + `<td>${(c.updated_at||'').slice(0,19).replace('T',' ')}</td><td><code>${c.id.slice(0,8)}…</code></td></tr>`
        ).join('') || '<tr><td colspan="5" style="color:#64748b">none</td></tr>';
      } catch (e) { log('list error: ' + e.message); }
    }

    initSync();
    refresh();
  </script>
</body>
</html>
